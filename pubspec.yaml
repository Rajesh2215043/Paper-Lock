name: paperlock
description: "A secure document storage and management app with biometric lock."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  local_auth: ^3.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2

  archive: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
